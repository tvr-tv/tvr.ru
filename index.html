@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');

a{
color:white;

body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    width: 100%;
}

.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('bg.png') no-repeat center center/cover;
    transition: transform 0.1s ease-out;
    will-change: transform;
z-index:-1;
}
.settings-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.2s;
}
.settings-btn img {
    width: 32px; height: 32px;
}
.settings-btn:hover {
    background: rgba(255,255,255,0.3);
}

/* --- МЕНЮ НАСТРОЕК --- */
.settings-menu {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    opacity: 0; /* Прозрачность для fade-in */
    transform: scale(0.9); /* Уменьшаем для эффекта вылета */
    transition: opacity 0.3s ease, transform 0.3s ease; /* Плавная анимация */
}

/* Класс для активного (открытого) меню */
.settings-menu.active {
    display: flex;
    opacity: 1; /* Появляется */
    transform: scale(1); /* Возвращается к нормальному размеру */
}

/* Анимация самого блока с настройками */
.menu-content {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transform: translateY(30px); /* Сдвиг вниз для эффекта вылета */
    opacity: 0;
    animation: fadeInUp 0.4s forwards; /* Анимация появления */
}

/* Ключевые кадры анимации */
@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.menu-content h3 {
    margin-top: 0;
}
.menu-content label {
    display: block;
}
.menu-content button,
.menu-content a {
    display: block;
    margin-top: 15px;
}
</style>

<script>
// Используем onmousemove для body
document.body.onmousemove = function(e) {
    const bg = document.querySelector('.background');
    const x = (e.clientX / window.innerWidth - 0.5) * -20; // сдвиг по X
    const y = (e.clientY / window.innerHeight - 0.5) * -20; // сдвиг по Y
    bg.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
};
// --- УПРАВЛЕНИЕ МЕНЮ ---
function toggleMenu() {
   const menu = document.getElementById('settingsMenu');
   menu.classList.toggle('active');
}

// --- РАЗМЫТИЕ ФОНА ---
function toggleBlur() {
   const bg = document.querySelector('.background');
   const checkbox = document.getElementById('blurToggle');
   if (checkbox.checked) {
      bg.style.filter = 'blur(8px)';
   } else {
      bg.style.filter = 'none';
   }
}

</script>
